<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TFT Set 17 - 1 Stage Simulator - </title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- 🌟 Babelをバージョン固定（未固定だと自動更新で壊れる）。8系で従来のJSX変換に固定する -->
<script src="https://unpkg.com/@babel/standalone@8.0.1/babel.min.js"></script>
<script>
  // 🌟 JSXを classic ランタイム（React.createElement）に強制。
  //    これをしないと Babel 8 既定の automatic ランタイムが import 文を出力し、
  //    「Cannot use import statement outside a module」で全画面が真っ白になる。
  Babel.registerPreset('jsx-classic', {
    presets: [[Babel.availablePresets.react, { runtime: 'classic' }]],
  });
</script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">


<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<!-- データセット（app.js より前に読み込む） -->
<!-- champions / items は純粋なデータなので通常スクリプト -->
<script src="data-champions.js"></script>
<script src="data-items.js"></script>
<script src="data-encounters.js"></script>
<!-- augments は内部に JSX を含むため Babel で変換 -->
<script type="text/babel" data-presets="jsx-classic" src="data-augments.js"></script>

<!-- アプリ本体（JSX を含むため Babel で変換） -->
<script type="text/babel" data-presets="jsx-classic" src="app.js"></script>
</body>
</html>
